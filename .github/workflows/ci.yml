name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy librosa pyloudnorm mutagen soundfile av sounddevice PyOpenGL PyQt6
          pip install pytest pyfftw || pip install pytest
          pip install -e . --no-deps

      - name: Run algorithm tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/test_analyzer.py -v --tb=short

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check --select=E,F,W --ignore=E501,E402,F405,F403 --exclude=".claude,build,dist,run_check.py" .
